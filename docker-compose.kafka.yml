version: "3.8"

# ─────────────────────────────────────────────────────────
# Redpanda — single-node Kafka-compatible broker (no ZooKeeper)
# Fast startup, minimal resources, full Kafka API compatibility.
# ─────────────────────────────────────────────────────────
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: zozo-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --overprovisioned
      - --default-log-level=warn
    ports:
      - "19092:19092"   # External Kafka API (use localhost:19092 in .env.local)
      - "18082:18082"   # Pandaproxy (HTTP REST)
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Redpanda Console — Kafka UI (topics, messages, consumers)
  # Open http://localhost:8080 after starting
  # ─────────────────────────────────────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: zozo-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /etc/console/config.yaml
    volumes:
      - ./docker/redpanda-console-config.yaml:/etc/console/config.yaml:ro
    ports:
      - "8080:8080"

volumes:
  redpanda-data:
